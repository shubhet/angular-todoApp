<p> My todo ! </p>
<div class="container">
  <div class="row">
    <div class="col-md-6 offset-md-3">
      <h2>My Todo List</h2>
      <ul class="list-group">
        <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let todo of todos; let i = index">
          <div>
            <input type="checkbox" [checked]="!todo.active" (change)="toggleTodo(todo)" class="me-2">
            <span [class.text-decoration-line-through]="!todo.active">{{ todo.title }}</span>
          </div>
          <button class="btn btn-danger btn-sm" (click)="deleteTodo(todo)">Delete</button>
        </li>
      </ul>
      <div class="mt-3">
        <div class="d-flex gap-2">
          <input type="text" #todoInput class="form-control" placeholder="Add a new todo" (keyup.enter)="addTodo({sno: todos.length + 1, title: todoInput.value, desc: '', active: true}); todoInput.value=''">
          <button class="btn btn-primary" (click)="addTodo({sno: todos.length + 1, title: todoInput.value, desc: '', active: true}); todoInput.value=''">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>
